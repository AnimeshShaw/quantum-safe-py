name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — no PQC backend required (fast, runs on all Python versions)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core + dev dependencies
        run: pip install -e '.[dev]'

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short -q --junitxml=junit-unit-${{ matrix.python-version }}.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit-${{ matrix.python-version }}
          path: junit-unit-*.xml

  # ---------------------------------------------------------------------------
  # Integration tests — requires liboqs-python (pre-built binary on ubuntu)
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration tests (liboqs)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install with liboqs backend
        run: pip install -e '.[dev,liboqs]'

      - name: Verify liboqs loaded and ML-KEM-768 is available
        run: |
          python - <<'EOF'
          import oqs
          assert "ML-KEM-768" in oqs.get_enabled_kem_mechanisms(), "ML-KEM-768 not available"
          assert "ML-DSA-65"  in oqs.get_enabled_sig_mechanisms(), "ML-DSA-65 not available"
          print("liboqs OK —", oqs.oqs_version())
          EOF

      - name: Run full test suite (skip slow benchmarks)
        run: python -m pytest tests/ -v --tb=short -q -m "not slow" --junitxml=junit-integration.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-integration
          path: junit-integration.xml

  # ---------------------------------------------------------------------------
  # Lint and type-check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e '.[dev]'

      - name: Ruff (lint + import sort)
        run: python -m ruff check src/ tests/

      - name: Ruff (format check)
        run: python -m ruff format --check src/ tests/

      - name: Mypy (strict type check)
        run: python -m mypy src/quantum_safe

  # ---------------------------------------------------------------------------
  # DevSecOps — dependency vulnerability scan
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -e '.[liboqs]'

      - name: Audit dependencies for known CVEs
        # Fails the build if any dependency has a known vulnerability.
        # Use --ignore-vuln <GHSA-id> only with a documented justification.
        run: pip-audit --strict --desc on

  # ---------------------------------------------------------------------------
  # DevSecOps — static application security testing (Bandit)
  # ---------------------------------------------------------------------------
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit on src/
        # Severity HIGH or CRITICAL fails the build.
        # Medium issues are reported but don't block.
        run: |
          bandit -r src/ \
            --severity-level high \
            --confidence-level medium \
            -f json \
            -o bandit-report.json \
            || (cat bandit-report.json && exit 1)

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ---------------------------------------------------------------------------
  # DevSecOps — CodeQL semantic analysis
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ---------------------------------------------------------------------------
  # Sphinx docs build — catches import errors and broken cross-references
  # ---------------------------------------------------------------------------
  docs:
    name: Build Sphinx docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs dependencies
        run: pip install -e '.[docs]'

      - name: Build HTML docs (warnings as errors)
        run: sphinx-build -W --keep-going -b html docs/ docs/_build/html

      - name: Upload built docs
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-html
          path: docs/_build/html/
