# Read the Docs configuration
# https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

# Build Sphinx HTML docs
sphinx:
  configuration: docs/conf.py
  fail_on_warning: true

# Install the package and its docs extras so autodoc can import the source
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
